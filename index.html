<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geocache Quiz - Guldensporenslag</title>

<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
  }

  .container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    padding: 15px;
  }

  .box {
    background: white;
    width: 100%;
    height: 100%;
    max-width: 600px;
    max-height: 100%;
    border-radius: 0;
    padding: 25px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h1 {
    font-size: 26px;
    text-align: center;
    margin-bottom: 20px;
  }

  h2 {
    font-size: 22px;
    line-height: 1.4;
  }

  input {
    padding: 14px;
    font-size: 18px;
    margin-top: 20px;
    border-radius: 10px;
    border: 1px solid #ccc;
    width: 100%;
    box-sizing: border-box;
  }

  button {
    padding: 16px;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: #007BFF;
    color: white;
    width: 100%;
  }

  #feedback {
    margin-top: 10px;
    font-weight: bold;
  }

  .center {
    text-align: center;
  }
</style>

</head>

<body>

<div class="container">
  <div class="box">
    <h1>🛡️ Guldensporenslag Quiz</h1>
    <div id="quiz"></div>
  </div>
</div>

<script>
const vragen = [
  {
    vraag: "📍 Start aan de Onze-Lieve-Vrouwekerk\nIn welk jaar vond de Guldensporenslag plaats?",
    antwoord: "1302"
  },
  {
    vraag: "🚶 Ga naar het Groeningepark\nWie won de slag?",
    antwoord: "vlamingen"
  },
  {
    vraag: "📍 Kijk naar het standbeeld\nHoe heet het wapen van de Vlaamse strijders?",
    antwoord: "goedendag"
  },
  {
    vraag: "🏁 Ga naar het infopunt\nHoeveel gouden sporen werden verzameld? (schatting)",
    antwoord: "500"
  }
];

let huidigeVraag = 0;

function toonVraag() {
  const q = vragen[huidigeVraag];
  document.getElementById("quiz").innerHTML = `
    <h2>${q.vraag.replace(/\\n/g, "<br>")}</h2>
    <input type="text" id="antwoord" placeholder="Typ je antwoord hier">
    <button onclick="controleer()">Controleer</button>
    <p id="feedback"></p>
  `;
}

function controleer() {
  const input = document.getElementById("antwoord").value.toLowerCase().trim();
  const correct = vragen[huidigeVraag].antwoord;

  if (input === correct) {
    huidigeVraag++;
    if (huidigeVraag < vragen.length) {
      toonVraag();
    } else {
      document.getElementById("quiz").innerHTML = `
        <div class="center">
          <h2>🎉 Proficiat!</h2>
          <p>Je hebt de geocache voltooid!</p>
          <p><strong>🔐 De schatkist bevindt zich in het infopunt.</strong></p>
          <p><strong>Code: 1234</strong></p>
        </div>
      `;
    }
  } else {
    document.getElementById("feedback").innerText = "❌ Fout antwoord, probeer opnieuw!";
  }
}

toonVraag();
</script>

</body>
</html>
