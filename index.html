<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guldensporenslag Geocache Quiz</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}

.container {
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: stretch;
}

.box {
  width: 100%;
  max-width: 700px;
  background: #1c1c1c;
  display: flex;
  flex-direction: column;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 22px;
  background: #000;
}

img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.content {
  padding: 20px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.question {
  font-size: 20px;
  margin-bottom: 15px;
  line-height: 1.4;
}

.btn {
  background: #333;
  border: none;
  color: white;
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
  border-radius: 10px;
  width: 100%;
}

.btn:active {
  background: #555;
}

.feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <div class="box">

    <div class="header">
      🛡️ Guldensporenslag Geocache Quiz
    </div>

    <img id="img" src="" alt="">

    <div class="content">
      <div id="quiz"></div>
    </div>

  </div>
</div>

<script>

const vragen = [
  {
    vraag: "In welk jaar vond de Guldensporenslag plaats?",
    opties: ["1202", "1302", "1402", "1502"],
    antwoord: 1,
    img: "https://www.vilters-vanhemel.be/images/Guldensporenslag_Lands_Glorie.jpg"
  },
  {
    vraag: "Wie won de Guldensporenslag?",
    opties: ["Fransen", "Romeinen", "Vlamingen", "Engelsen"],
    antwoord: 2,
    img: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Flag_of_Flanders.svg"
  },
  {
    vraag: "Wat is een typische geocache?",
    opties: ["Schatkist", "Auto", "Televisie", "Fiets"],
    antwoord: 0,
    img: "https://upload.wikimedia.org/wikipedia/commons/6/6b/Geocaching_container.jpg"
  },
  {
    vraag: "Wat is het juiste eindpunt van deze tocht?",
    opties: ["Kerk", "Bos", "Infopunt Kortrijk", "Station"],
    antwoord: 2,
    img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/Kortrijk_Belfort.jpg"
  }
];

let huidige = 0;

function toonVraag() {
  const q = vragen[huidige];

  document.getElementById("img").src = q.img;

  let html = `
    <div class="question">${q.vraag}</div>
  `;

  q.opties.forEach((optie, index) => {
    html += `<button class="btn" onclick="check(${index})">${optie}</button>`;
  });

  html += `<div class="feedback" id="feedback"></div>`;

  document.getElementById("quiz").innerHTML = html;
}

function check(gekozen) {
  if (gekozen === vragen[huidige].antwoord) {
    huidige++;

    if (huidige < vragen.length) {
      toonVraag();
    } else {
      document.getElementById("img").style.display = "none";
      document.getElementById("quiz").innerHTML = `
        <h2>🎉 Proficiat!</h2>
        <p>Je hebt de geocache voltooid.</p>
        <p><strong>🔐 Schatkist gevonden in het infopunt</strong></p>
        <p><strong>Code: 1234</strong></p>
      `;
    }
  } else {
    document.getElementById("feedback").innerText = "❌ Fout antwoord, probeer opnieuw";
  }
}

toonVraag();

</script>

</body>
</html>
