<!DOCTYPE html>

<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geocache Quiz - Guldensporenslag</title>

<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background-color: #f4f4f4;
    font-size: 18px;
  }

  .box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    max-width: 600px;
    margin: auto;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  h1 {
    font-size: 24px;
  }

  h2 {
    font-size: 20px;
    line-height: 1.4;
  }

  input {
    padding: 12px;
    width: 100%;
    font-size: 18px;
    margin-top: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  button {
    padding: 14px;
    width: 100%;
    margin-top: 15px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background-color: #007BFF;
    color: white;
  }

  button:active {
    background-color: #0056b3;
  }

  #feedback {
    margin-top: 10px;
    font-weight: bold;
  }
</style>

</head>

<body>

<div class="box">
  <h1>🛡️ Guldensporenslag Quiz</h1>
  <div id="quiz"></div>
</div>

<script>
const vragen = [
  {
    vraag: "📍 Start aan de Onze-Lieve-Vrouwekerk\nIn welk jaar vond de Guldensporenslag plaats?",
    antwoord: "1302"
  },
  {
    vraag: "🚶 Ga naar het Groeningepark\nWie won de slag?",
    antwoord: "vlamingen"
  },
  {
    vraag: "📍 Kijk naar het standbeeld\nHoe heet het wapen van de Vlaamse strijders?",
    antwoord: "goedendag"
  },
  {
    vraag: "🏁 Ga naar het infopunt\nHoeveel gouden sporen werden verzameld? (schatting)",
    antwoord: "500"
  }
];

let huidigeVraag = 0;

function toonVraag() {
  const q = vragen[huidigeVraag];
  document.getElementById("quiz").innerHTML = `
    <h2>${q.vraag.replace(/\\n/g, "<br>")}</h2>
    <input type="text" id="antwoord" placeholder="Typ je antwoord hier">
    <button onclick="controleer()">Controleer</button>
    <p id="feedback"></p>
  `;
}

function controleer() {
  const input = document.getElementById("antwoord").value.toLowerCase().trim();
  const correct = vragen[huidigeVraag].antwoord;

  if (input === correct) {
    huidigeVraag++;
    if (huidigeVraag < vragen.length) {
      toonVraag();
    } else {
      document.getElementById("quiz").innerHTML = `
        <h2>🎉 Proficiat!</h2>
        <p>Je hebt de geocache voltooid!</p>
        <p><strong>🔐 De schatkist bevindt zich in het infopunt.</strong></p>
        <p><strong>Code: 1234</strong></p>
      `;
    }
  } else {
    document.getElementById("feedback").innerText = "❌ Fout antwoord, probeer opnieuw!";
  }
}

toonVraag();
</script>

</body>
</html>
