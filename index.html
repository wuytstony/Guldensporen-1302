<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guldensporenslag - Geocache</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

.screen{
  display:none;
  height:100vh;
  padding:25px;
  box-sizing:border-box;
  text-align:center;
  flex-direction:column;
  justify-content:center;
}

.active{display:flex;}

button{
  width:100%;
  max-width:500px;
  margin:8px auto;
  padding:16px;
  font-size:16px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

button:hover{background:#374151;}

.primary{
  background:#22c55e;
  color:black;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- START -->
<div class="screen active" id="start">
  <h1>🏰 Guldensporenslag 1302</h1>
  <p>Start de missie op de juiste locatie</p>
  <button class="primary" onclick="startGPS()">Start missie</button>
  <p id="msg"></p>
</div>

<!-- MISSIE -->
<div class="screen" id="mission">
  <h2 id="title">Locatie</h2>
  <p id="info">Laden...</p>
  <button class="primary" onclick="checkGPS()">Controleer locatie</button>
  <p id="gpsmsg"></p>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <h2 id="qtitle"></h2>
  <div id="answers"></div>
</div>

<!-- EINDE -->
<div class="screen" id="end">
  <h2>🎉 Missie voltooid</h2>
  <p>Ga naar het infopunt en toon deze code:</p>
  <h1 id="code"></h1>
</div>

<script>

/* ---------------------------
   LOCATIES (PAS AAN IN KORTRIJK)
---------------------------- */

const steps = [
  {
    name: "Onze-Lieve-Vrouwekerk Kortrijk",
    lat: 50.8279,
    lon: 3.2649,
    radius: 80,
    info: "Startpunt van de tocht rond 1302."
  },
  {
    name: "Groeningepark",
    lat: 50.8296,
    lon: 3.2685,
    radius: 80,
    info: "Hier staat het monument van de Guldensporenslag."
  },
  {
    name: "Infopunt Kortrijk",
    lat: 50.8275,
    lon: 3.2640,
    radius: 80,
    info: "Eindpunt van de missie."
  }
];

/* QUIZ PER STAP */
const quiz = [
  {
    q: "Wanneer was de Guldensporenslag?",
    a: [
      ["1303", false],
      ["11 juli 1302", true],
      ["1299", false],
      ["1310", false]
    ]
  },
  {
    q: "Tegen welk leger?",
    a: [
      ["Fransen", true],
      ["Engelsen", false],
      ["Duitsers", false],
      ["Spanjaarden", false]
    ]
  }
];

const codes = {
1:"4817",2:"9023",3:"6631"
};

/* ---------------------------
   STATE
---------------------------- */

let step = 0;

/* ---------------------------
   START
---------------------------- */

function startGPS(){
  step = 0;
  show("mission");
  loadStep();
}

/* ---------------------------
   STEP LOAD
---------------------------- */

function loadStep(){
  document.getElementById("title").innerText = steps[step].name;
  document.getElementById("info").innerText = steps[step].info;
}

/* ---------------------------
   GPS CHECK
---------------------------- */

function checkGPS(){
  navigator.geolocation.getCurrentPosition(pos => {

    const d = distance(
      pos.coords.latitude,
      pos.coords.longitude,
      steps[step].lat,
      steps[step].lon
    );

    document.getElementById("gpsmsg").innerText =
      "Afstand: " + Math.round(d) + " meter";

    if(d <= steps[step].radius){
      next();
    } else {
      document.getElementById("gpsmsg").innerText =
        "Je bent nog te ver ("+Math.round(d)+"m)";
    }

  });
}

/* ---------------------------
   VOLGENDE STAP
---------------------------- */

function next(){

  if(step < steps.length - 1){
    showQuiz();
  } else {
    finish();
  }
}

/* ---------------------------
   QUIZ
---------------------------- */

function showQuiz(){
  show("quiz");

  const q = quiz[step];
  document.getElementById("qtitle").innerText = q.q;

  const box = document.getElementById("answers");
  box.innerHTML = "";

  q.a.forEach(opt => {
    const b = document.createElement("button");
    b.innerText = opt[0];
    b.onclick = () => {
      if(opt[1]){
        step++;
        show("mission");
        loadStep();
      } else {
        alert("Fout antwoord");
      }
    };
    box.appendChild(b);
  });
}

/* ---------------------------
   EINDE
---------------------------- */

function finish(){
  show("end");
  const day = new Date().getDate();
  document.getElementById("code").innerText = codes[step] || "XXXX";
}

/* ---------------------------
   HELPERS
---------------------------- */

function show(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function distance(a,b,c,d){
  const R=6371e3;
  const φ1=a*Math.PI/180;
  const φ2=c*Math.PI/180;
  const dφ=(c-a)*Math.PI/180;
  const dλ=(d-b)*Math.PI/180;

  const x=Math.sin(dφ/2)**2+
          Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;

  return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

</script>

</body>
</html>
