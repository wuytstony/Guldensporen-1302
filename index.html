<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guldensporenslag Geogame</title>
    <style>
        :root {
            --primary-color: #E5A93C;
            --primary-dark: #c48b27;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-muted: #b3b3b3;
            --success-color: #2e7d32;
            --error-color: #c62828;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 550px;
            position: relative;
        }

        .header {
            background-color: #222;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-color);
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        .progress-bar {
            height: 4px;
            background-color: #444;
            width: 100%;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .screen {
            display: none;
            padding: 20px;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .screen.active {
            display: flex;
        }
